# ===========================================
# Docker Compose - Production (OPR Mode)
# ===========================================
# Usage:
#   docker compose up -d                    # 운영 모드 (기본)
#   docker compose --profile dev up -d      # 개발 모드
#   docker compose down                     # 종료
# ===========================================

services:
  # -----------------------------------------
  # MariaDB
  # -----------------------------------------
  mariadb:
    image: mariadb:latest
    container_name: docker_mariadb
    restart: unless-stopped
    ports:
      - "33061:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: docker
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      TZ: Asia/Seoul
    volumes:
      # 설정 파일
      - ./db/conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      # 초기화 스크립트 (컨테이너 최초 실행시 자동 import)
      - ./db/script/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # 데이터 영속화
      - mariadb_data:/var/lib/mysql
      # 로그 디렉토리
      - ./db/logs:/var/log/mysql      
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    # healthcheck:
    #   test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 30s
    networks:
      - docker-mng

  # -----------------------------------------
  # API Gateway
  # -----------------------------------------
  api-gateway:
    image: ${REGISTRY_URL}/api-gateway:latest
    container_name: api-gateway
    ports:
      - "9081:9081"
    volumes:
      - ./services/api-gateway/app.env:/app/app.env:ro
      # build fild
      - ./wwwroot:/app/wwwroot
    command: ["-MODE=1"]  # 운영 모드
    depends_on:
      - auth-service
      - docker-service
    networks:
      - docker-mng
    restart: unless-stopped

  # API Gateway (개발 모드) - profile로 선택
  api-gateway-dev:
    image: ${REGISTRY_URL}/api-gateway:latest
    container_name: api-gateway-dev
    profiles: ["dev"]
    ports:
      - "9081:9081"
    env_file:
      - ./services/api-gateway/app.env
    #volumes:
      #- ./services/api-gateway/app.env:/app/app.env:ro
    command: ["-MODE=0"]  # 개발 모드
    networks:
      - docker-mng
    restart: unless-stopped

  # -----------------------------------------
  # Auth Service
  # -----------------------------------------
  auth-service:
    image: ${REGISTRY_URL}/auth-service:latest
    container_name: auth-service
    ports:
      - "9090:9090"      # REST API
      - "9190:9190"      # gRPC
      - "9091:9091"      # gRPC Gateway
    environment:
      - DB_DRIVER=mariadb
      - DB_ADDRESS=docker_mariadb
      - DB_PORT=3306
      - DB_USER=dev
      - DB_PASSWD=dev
      - DB_NAME=docker
    env_file:
      - ./services/auth_service/app.env
    #volumes:
      #- ./services/auth_service/app.env:/app/app.env:ro
    depends_on:
      - mariadb
    networks:
      - docker-mng
    restart: unless-stopped

  # -----------------------------------------
  # Docker Service
  # -----------------------------------------
  docker-service:
    image: ${REGISTRY_URL}/docker-service:latest
    container_name: docker-service
    ports:
      - "9083:9083"
    environment:
      - CERT_PATH=/certs
    env_file:
      - ./services/docker-service/app.env
    volumes:
      #- ./services/docker-service/app.env:/app/app.env:ro
      #- /home/gildong/work/go/src/docker_mng/docker_service/services/docker_service/certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - docker-mng
    restart: unless-stopped

# -----------------------------------------
# Networks
# -----------------------------------------
networks:
  docker-mng:
    driver: bridge

# -----------------------------------------
# Volumes
# -----------------------------------------
volumes:
  mariadb_data:
    driver: local
